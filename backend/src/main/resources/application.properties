spring.application.name=backend

# Local-development defaults. Every value is still overridable via the same
# environment variable used in production (see application-prod.properties);
# only this file falls back to localhost when the variable is unset.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nobetci_eczane_plus}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Many hosting platforms (Railway, Render, Fly.io, ...) inject PORT at
# runtime; 8080 keeps local `mvn spring-boot:run` working unchanged.
server.port=${PORT:8080}

# Permissive by default for local development (Flutter web dev server,
# Android emulator, etc.); production requires an explicit, non-default
# value — see application-prod.properties.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# AI assistant (Gemini). No default for the key — an empty value means the
# assistant endpoint responds with a clean 503 instead of crashing the app,
# so local dev/CI works without it configured.
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
