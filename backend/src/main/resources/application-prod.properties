# Activated with SPRING_PROFILES_ACTIVE=prod. Every value below is required
# with no fallback — the app fails fast at startup rather than silently
# defaulting to a local/insecure value in production.

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Comma-separated list of exact origins, e.g.
# https://app.nobetcieczaneplus.com,https://admin.nobetcieczaneplus.com
# No wildcard default here — an operator must set this explicitly.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

server.port=${PORT:8080}

logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
